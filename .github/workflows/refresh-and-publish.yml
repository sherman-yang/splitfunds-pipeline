name: Refresh and Publish

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build latest site
        run: python scripts/refresh.py --output site

      - name: Publish to public repo
        env:
          PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
          PUBLIC_REPO: ${{ secrets.PUBLIC_REPO }}
        run: |
          if [ -z "$PUBLIC_REPO_PAT" ]; then
            echo "Missing PUBLIC_REPO_PAT" >&2
            exit 1
          fi
          if [ -z "$PUBLIC_REPO" ]; then
            echo "Missing PUBLIC_REPO (set as secret)" >&2
            exit 1
          fi
          rm -rf public_repo
          git clone "https://x-access-token:${PUBLIC_REPO_PAT}@github.com/${PUBLIC_REPO}.git" public_repo
          rsync -av --delete site/ public_repo/
          cd public_repo
          git config user.name "splitfunds-bot"
          git config user.email "splitfunds-bot@users.noreply.github.com"
          git add .
          git commit -m "Update site $(date -u +%F)" || exit 0
          git push
